name: Release (nightly per commit)

# Builds the `grok` binary (crate: xai-grok-pager-bin) for macOS (Apple Silicon)
# and Linux (x86_64) on every push to main, then publishes a GitHub Release
# tagged `nightly-<short-sha>` with the binaries attached.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed so the release job can create tags + releases via the GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      # protoc is required by the proto codegen build scripts. `xai-proto-build`
      # checks $PROTOC first (highest priority), so install protoc and point at it.
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      # The toolchain (1.92.0) is pinned by rust-toolchain.toml; rustup installs
      # it on first use. Add the explicit target so `--target` resolves.
      - name: Set up Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup target add ${{ matrix.target }}
          rustc --version

      # Caches the cargo registry + compiled dependencies (the bulk of a
      # from-scratch build). `shared-key` is a stable per-target key so the
      # cache is reused across every commit/run (not scoped to one job id);
      # `cache-on-failure` still saves it when a build fails, so slow first
      # builds don't have to start cold on the next attempt.
      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --locked -p xai-grok-pager-bin --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/xai-grok-pager"
          dist="grok-${{ matrix.target }}"
          mkdir -p "$dist"
          # Ship the binary under its install name `grok`.
          cp "$bin" "$dist/grok"
          cp README.md LICENSE "$dist/" 2>/dev/null || true
          tar -czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-${{ matrix.target }}
          path: |
            grok-${{ matrix.target }}.tar.gz
            grok-${{ matrix.target }}.tar.gz.sha256
          retention-days: 7
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update the per-commit release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          tag="nightly-${short_sha}"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          notes="Automated build of \`main\` @ \`${short_sha}\` (${built_at}).

          Binaries (extract, then run \`grok\`):
          - **macOS (Apple Silicon):** \`grok-aarch64-apple-darwin.tar.gz\`
          - **Linux (x86_64):** \`grok-x86_64-unknown-linux-gnu.tar.gz\`

          \`.sha256\` files accompany each archive."

          # Idempotent: on a re-run (same commit), replace the assets in place.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/**/grok-*.tar.gz* --clobber
          else
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "Build ${short_sha}" \
              --notes "$notes" \
              --prerelease \
              artifacts/**/grok-*.tar.gz*
          fi
